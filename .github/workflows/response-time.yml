name: Response Time CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [response_time]
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  response-time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@master
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
